<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM8 | Home</title>
    <link rel="icon" type="image/x-icon" href="assets/myicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(255, 0, 0, 0.7);
            --primary-solid: #ff0000;
            --bg-dark: #000000;
            --panel-bg: rgba(20, 20, 20, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            perspective: 1000px; /* The Lens of the Matrix */
        }

        /* The 3D World Space */
        #world {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Generative 3D Particles */
        .particle {
            position: absolute; width: 3px; height: 3px;
            background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 10px 3px var(--primary-glow), 0 0 25px 8px var(--primary-solid);
            transform-style: preserve-3d;
        }

        /* The Main Card - Pushed deep into the Z-axis initially */
        .home-container {
            position: absolute; top: 50%; left: 50%;
            /* Starts DEEP in the screen */
            transform: translate(-50%, -50%) translateZ(-3000px);
            background-color: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 60px 40px; border-radius: 24px;
            width: 90%; max-width: 500px; text-align: center;
            border: 1px solid var(--panel-border);
            box-shadow: 0 0 40px -10px var(--primary-glow), inset 0 10px 15px -5px rgba(255, 255, 255, 0.1);
            opacity: 0; transition: opacity 0.5s ease;
            pointer-events: none; /* No clicking when far away */
        }
        
        .home-container.active {
            opacity: 1; pointer-events: auto;
        }

        .home-container::before {
            content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-solid), transparent);
            filter: blur(1px);
        }

        h1 { margin: 0 0 15px 0; font-size: 2.8em; font-weight: 600; letter-spacing: -1px; }
        p { margin: 0 0 45px 0; color: var(--text-muted); font-weight: 300; font-size: 1.1em; line-height: 1.6; }

        .portal-btn {
            display: inline-block; padding: 16px 32px;
            background: linear-gradient(135deg, #ff0000, var(--primary-solid));
            color: var(--bg-dark); text-decoration: none; border-radius: 12px;
            font-weight: 600; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 20px var(--primary-glow); transition: all 0.3s ease;
        }

        .portal-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 0, 0.9); }
        .source-link { display: block; margin-top: 25px; color: #555; font-size: 0.85em; text-decoration: none; transition: color 0.3s ease; }
        .source-link:hover { color: #888; text-decoration: underline; }

        .scroll-hint {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            color: var(--primary-solid); text-transform: uppercase; font-weight: 600; letter-spacing: 3px; font-size: 0.8em;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            transition: opacity 0.5s ease;
        }
        .scroll-hint svg { width: 24px; height: 24px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    </style>
</head>
<body>

    <div id="world">
        <div class="home-container" id="card">
            <h1>Welcome to MM8</h1>
            <p>The genesis of something massive. Initialize your access clearance to join the initiative.</p>
            <a href="auth.html" class="portal-btn">ENTER MM8 MAIN ACCESS</a>
            <a href="https://github.com/mmviiiofficial/mmviiiofficial.github.io" class="source-link">View Mainframe Source</a>
        </div>
    </div>

    <div class="scroll-hint" id="hint">
        Scroll to Dive In
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
    </div>

    <script>
        const world = document.getElementById('world');
        const card = document.getElementById('card');
        const hint = document.getElementById('hint');
        
        // Build the physical red particle universe
        for (let i = 0; i < 120; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let x = (Math.random() - 0.5) * 4000;
            let y = (Math.random() - 0.5) * 4000;
            let z = (Math.random() * 4500) - 3500; 
            p.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            world.appendChild(p);
        }

        let cameraZ = 0;
        let targetZ = 0;
        let mouseX = 0, mouseY = 0;
        let targetRotX = 0, targetRotY = 0;

        // Desktop Zoom
        window.addEventListener('wheel', (e) => {
            targetZ += e.deltaY * 3.5; 
            if (targetZ < 0) targetZ = 0;
            if (targetZ > 3000) targetZ = 3000; // Cap at 3000 so the card stops perfectly
        });

        // Mobile swipe-to-zoom (Because we are professionals)
        let lastTouchY = 0;
        window.addEventListener('touchstart', e => { lastTouchY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => {
            let delta = lastTouchY - e.touches[0].clientY;
            targetZ += delta * 6;
            if (targetZ < 0) targetZ = 0;
            if (targetZ > 3000) targetZ = 3000;
            lastTouchY = e.touches[0].clientY;
        });

        // Parallax Mouse Look
        window.addEventListener('mousemove', (e) => {
            targetRotY = (e.clientX / window.innerWidth - 0.5) * 5; 
            targetRotX = -(e.clientY / window.innerHeight - 0.5) * 5; 
        });

        function animate() {
            // Deceleration physics for buttery smoothness
            cameraZ += (targetZ - cameraZ) * 0.08;
            mouseX += (targetRotY - mouseX) * 0.05;
            mouseY += (targetRotX - mouseY) * 0.05;

            world.style.transform = `translate(-50%, -50%) translateZ(${cameraZ}px) rotateX(${mouseY}deg) rotateY(${mouseX}deg)`;

            // Reveal the form as we fly closer
            if (cameraZ > 2400) {
                card.classList.add('active');
                hint.style.opacity = 0;
            } else {
                card.classList.remove('active');
                hint.style.opacity = 1;
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
